<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <linearGradient id="capeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    <linearGradient id="armorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
    <linearGradient id="bladeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e5e7eb"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <!-- Cape (behind body) -->
  <path d="M 60 110 Q 50 180 40 250 L 50 260 L 70 250 L 75 180 Z" fill="url(#capeGrad)" stroke="#831843" stroke-width="1.5"/>
  <path d="M 140 110 Q 150 180 160 250 L 150 260 L 130 250 L 125 180 Z" fill="url(#capeGrad)" stroke="#831843" stroke-width="1.5"/>

  <!-- Boots -->
  <ellipse cx="80" cy="265" rx="18" ry="10" fill="#831843"/>
  <ellipse cx="120" cy="265" rx="18" ry="10" fill="#831843"/>

  <!-- Legs / armor greaves -->
  <rect x="70" y="220" width="20" height="40" fill="url(#armorGrad)" stroke="#831843" stroke-width="1"/>
  <rect x="110" y="220" width="20" height="40" fill="url(#armorGrad)" stroke="#831843" stroke-width="1"/>

  <!-- Skirt / tasset -->
  <path d="M 60 200 L 140 200 L 145 230 L 55 230 Z" fill="url(#armorGrad)" stroke="#831843" stroke-width="1.5"/>

  <!-- Torso -->
  <path d="M 70 110 Q 70 100 100 100 Q 130 100 130 110 L 135 200 L 65 200 Z" fill="url(#armorGrad)" stroke="#831843" stroke-width="2"/>
  <!-- Chest plate detail -->
  <path d="M 85 130 L 100 145 L 115 130 L 115 170 L 85 170 Z" fill="#f9a8d4" stroke="#831843" stroke-width="1.5" opacity="0.6"/>
  <circle cx="100" cy="155" r="6" fill="#fbbf24" stroke="#831843" stroke-width="1.5"/>

  <!-- Arms -->
  <ellipse cx="55" cy="155" rx="12" ry="35" fill="url(#armorGrad)" stroke="#831843" stroke-width="1.5" transform="rotate(-15 55 155)"/>
  <ellipse cx="145" cy="135" rx="12" ry="35" fill="url(#armorGrad)" stroke="#831843" stroke-width="1.5" transform="rotate(20 145 135)"/>

  <!-- Hands -->
  <circle cx="50" cy="190" r="8" fill="#fde2c4" stroke="#92400e" stroke-width="1"/>
  <circle cx="155" cy="105" r="8" fill="#fde2c4" stroke="#92400e" stroke-width="1"/>

  <!-- Sword (right hand, raised) -->
  <rect x="152" y="20" width="6" height="90" fill="url(#bladeGrad)" stroke="#6b7280" stroke-width="1"/>
  <rect x="140" y="105" width="30" height="6" fill="#fbbf24" stroke="#831843" stroke-width="1.5"/>
  <rect x="149" y="108" width="12" height="20" fill="#831843"/>
  <circle cx="155" cy="15" r="4" fill="#fbbf24"/>

  <!-- Neck -->
  <rect x="92" y="90" width="16" height="15" fill="#fde2c4" stroke="#92400e" stroke-width="1"/>

  <!-- Head -->
  <ellipse cx="100" cy="70" rx="28" ry="32" fill="#fde2c4" stroke="#92400e" stroke-width="2"/>

  <!-- Hair (long wavy, signature) -->
  <path d="M 72 60 Q 65 50 70 35 Q 75 20 100 18 Q 125 20 130 35 Q 135 50 128 60
           L 130 80 Q 135 110 130 130 L 128 145 L 125 140
           Q 128 115 120 90 L 100 88 L 80 90 Q 72 115 75 140 L 72 145 L 70 130
           Q 65 110 70 80 Z"
        fill="url(#hairGrad)" stroke="#000" stroke-width="1"/>

  <!-- Front bangs -->
  <path d="M 80 45 Q 85 35 100 38 Q 115 35 120 45 Q 115 50 105 48 Q 95 50 85 48 Z" fill="url(#hairGrad)"/>

  <!-- Face features -->
  <!-- Eyes (confident, smiling) -->
  <ellipse cx="90" cy="70" rx="3" ry="4" fill="#1f2937"/>
  <ellipse cx="110" cy="70" rx="3" ry="4" fill="#1f2937"/>
  <circle cx="91" cy="69" r="1" fill="#fff"/>
  <circle cx="111" cy="69" r="1" fill="#fff"/>
  <!-- Eyebrows (determined) -->
  <path d="M 84 63 L 95 61" stroke="#1f2937" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 105 61 L 116 63" stroke="#1f2937" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M 100 73 L 99 78 L 101 78 Z" fill="#f9a8d4" opacity="0.7"/>
  <!-- Smile (confident smirk) -->
  <path d="M 92 84 Q 100 90 108 84" stroke="#831843" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Cheek blush -->
  <circle cx="85" cy="80" r="3" fill="#f9a8d4" opacity="0.5"/>
  <circle cx="115" cy="80" r="3" fill="#f9a8d4" opacity="0.5"/>

  <!-- Pink gem on chest -->
  <circle cx="100" cy="155" r="4" fill="#fbbf24" stroke="#831843" stroke-width="1"/>
</svg>
