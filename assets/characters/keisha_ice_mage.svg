<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <linearGradient id="robeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="hairGradK" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="orbGlow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#dbeafe" stop-opacity="1"/>
      <stop offset="40%" stop-color="#60a5fa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1e40af" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Robe bottom (wide flowing) -->
  <path d="M 50 180 L 60 270 L 140 270 L 150 180 Z" fill="url(#robeGrad)" stroke="#1e3a8a" stroke-width="2"/>
  <!-- Robe vertical lines (texture) -->
  <line x1="75" y1="190" x2="72" y2="265" stroke="#1e40af" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="190" x2="100" y2="265" stroke="#1e40af" stroke-width="1" opacity="0.5"/>
  <line x1="125" y1="190" x2="128" y2="265" stroke="#1e40af" stroke-width="1" opacity="0.5"/>

  <!-- Snowflake patterns on robe -->
  <g stroke="#dbeafe" stroke-width="1" fill="none" opacity="0.7">
    <g transform="translate(70 220)">
      <line x1="-5" y1="0" x2="5" y2="0"/>
      <line x1="0" y1="-5" x2="0" y2="5"/>
      <line x1="-3.5" y1="-3.5" x2="3.5" y2="3.5"/>
      <line x1="-3.5" y1="3.5" x2="3.5" y2="-3.5"/>
    </g>
    <g transform="translate(130 240)">
      <line x1="-4" y1="0" x2="4" y2="0"/>
      <line x1="0" y1="-4" x2="0" y2="4"/>
    </g>
    <g transform="translate(90 250)">
      <line x1="-3" y1="0" x2="3" y2="0"/>
      <line x1="0" y1="-3" x2="0" y2="3"/>
    </g>
  </g>

  <!-- Robe upper body -->
  <path d="M 70 110 Q 70 100 100 100 Q 130 100 130 110 L 145 180 L 55 180 Z" fill="url(#robeGrad)" stroke="#1e3a8a" stroke-width="2"/>

  <!-- High mandarin collar (covers V neckline, no skin showing) -->
  <path d="M 80 100 Q 80 118 100 118 Q 120 118 120 100 Z" fill="#1e40af" stroke="#0c1f5e" stroke-width="1.5"/>
  <path d="M 84 102 Q 100 110 116 102" stroke="#dbeafe" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- Collar vertical seam -->
  <line x1="100" y1="102" x2="100" y2="115" stroke="#dbeafe" stroke-width="0.8" opacity="0.5"/>
  <!-- Collar rim highlight -->
  <path d="M 78 100 Q 100 95 122 100" stroke="#dbeafe" stroke-width="1.2" fill="none" opacity="0.5"/>

  <!-- Arms / sleeves -->
  <ellipse cx="50" cy="145" rx="18" ry="30" fill="url(#robeGrad)" stroke="#1e3a8a" stroke-width="1.5" transform="rotate(-25 50 145)"/>
  <ellipse cx="150" cy="145" rx="18" ry="30" fill="url(#robeGrad)" stroke="#1e3a8a" stroke-width="1.5" transform="rotate(25 150 145)"/>

  <!-- Sleeve cuffs -->
  <ellipse cx="38" cy="170" rx="16" ry="8" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5" transform="rotate(-25 38 170)"/>
  <ellipse cx="162" cy="170" rx="16" ry="8" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5" transform="rotate(25 162 170)"/>

  <!-- Hands -->
  <circle cx="35" cy="180" r="7" fill="#fde68a" stroke="#92400e" stroke-width="1"/>
  <circle cx="165" cy="180" r="7" fill="#fde68a" stroke="#92400e" stroke-width="1"/>

  <!-- Staff (right hand) -->
  <line x1="165" y1="180" x2="165" y2="40" stroke="#92400e" stroke-width="6" stroke-linecap="round"/>
  <line x1="165" y1="180" x2="165" y2="40" stroke="#451a03" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Staff wraps -->
  <line x1="160" y1="100" x2="170" y2="105" stroke="#fbbf24" stroke-width="2"/>
  <line x1="160" y1="120" x2="170" y2="125" stroke="#fbbf24" stroke-width="2"/>
  <line x1="160" y1="140" x2="170" y2="145" stroke="#fbbf24" stroke-width="2"/>

  <!-- Staff orb glow -->
  <circle cx="165" cy="35" r="22" fill="url(#orbGlow)"/>
  <circle cx="165" cy="35" r="14" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
  <!-- Snowflake inside orb -->
  <g transform="translate(165 35)" stroke="#1e40af" stroke-width="1.5" fill="none">
    <line x1="-8" y1="0" x2="8" y2="0"/>
    <line x1="0" y1="-8" x2="0" y2="8"/>
    <line x1="-5.5" y1="-5.5" x2="5.5" y2="5.5"/>
    <line x1="-5.5" y1="5.5" x2="5.5" y2="-5.5"/>
  </g>

  <!-- Magic sparkles around orb -->
  <g fill="#dbeafe">
    <circle cx="180" cy="20" r="1.5"/>
    <circle cx="148" cy="22" r="1.5"/>
    <circle cx="185" cy="50" r="1"/>
    <circle cx="145" cy="48" r="1"/>
  </g>

  <!-- Neck -->
  <rect x="92" y="88" width="16" height="14" fill="#fde68a" stroke="#92400e" stroke-width="1"/>

  <!-- Head -->
  <ellipse cx="100" cy="68" rx="28" ry="32" fill="#fde68a" stroke="#92400e" stroke-width="2"/>

  <!-- Hair (long curly, signature) -->
  <path d="M 70 55 Q 60 45 65 30 Q 70 15 100 12 Q 130 15 135 30 Q 140 45 130 55
           L 138 80 Q 145 120 135 155 L 130 165 L 125 155
           Q 135 120 125 85 L 100 83 L 75 85 Q 65 120 75 155 L 70 165 L 65 155
           Q 55 120 62 80 Z"
        fill="url(#hairGradK)" stroke="#000" stroke-width="1"/>

  <!-- Hair curls (signature curly texture) -->
  <circle cx="72" cy="100" r="6" fill="url(#hairGradK)"/>
  <circle cx="68" cy="120" r="7" fill="url(#hairGradK)"/>
  <circle cx="128" cy="100" r="6" fill="url(#hairGradK)"/>
  <circle cx="132" cy="120" r="7" fill="url(#hairGradK)"/>
  <circle cx="125" cy="140" r="5" fill="url(#hairGradK)"/>
  <circle cx="75" cy="140" r="5" fill="url(#hairGradK)"/>

  <!-- Front bangs (curly fringe) -->
  <path d="M 80 42 Q 82 32 95 35 Q 100 30 110 35 Q 120 32 122 42 Q 115 50 105 45 Q 100 48 95 45 Q 85 50 80 42 Z" fill="url(#hairGradK)"/>

  <!-- Face features -->
  <!-- Eyes (focused, magical) -->
  <ellipse cx="90" cy="68" rx="3" ry="4" fill="#1f2937"/>
  <ellipse cx="110" cy="68" rx="3" ry="4" fill="#1f2937"/>
  <circle cx="91" cy="67" r="1.2" fill="#60a5fa"/>
  <circle cx="111" cy="67" r="1.2" fill="#60a5fa"/>
  <circle cx="89.5" cy="69" r="0.6" fill="#fff"/>
  <circle cx="109.5" cy="69" r="0.6" fill="#fff"/>
  <!-- Eyebrows (concentrated) -->
  <path d="M 84 61 Q 89 59 95 61" stroke="#1f2937" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 105 61 Q 111 59 116 61" stroke="#1f2937" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M 100 71 L 99 76 L 101 76 Z" fill="#f9a8d4" opacity="0.5"/>
  <!-- Soft smile -->
  <path d="M 93 82 Q 100 87 107 82" stroke="#92400e" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Cheek blush -->
  <circle cx="85" cy="78" r="3" fill="#fb923c" opacity="0.3"/>
  <circle cx="115" cy="78" r="3" fill="#fb923c" opacity="0.3"/>
</svg>
