<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" width="160" height="200">
  <defs>
    <linearGradient id="slimeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="80" cy="190" rx="50" ry="8" fill="#000" opacity="0.3"/>

  <!-- Slime body (blob) -->
  <path d="M 30 130 Q 20 100 35 80 Q 50 60 80 60 Q 110 60 125 80 Q 140 100 130 130 Q 135 160 110 175 L 50 175 Q 25 160 30 130 Z" fill="url(#slimeGrad)" stroke="#15803d" stroke-width="2"/>

  <!-- Highlight (slime gloss) -->
  <ellipse cx="60" cy="80" rx="15" ry="8" fill="#dcfce7" opacity="0.7"/>
  <ellipse cx="55" cy="78" rx="6" ry="3" fill="white" opacity="0.6"/>

  <!-- Eyes (big cute) -->
  <ellipse cx="65" cy="100" rx="8" ry="10" fill="white" stroke="#15803d" stroke-width="2"/>
  <ellipse cx="95" cy="100" rx="8" ry="10" fill="white" stroke="#15803d" stroke-width="2"/>
  <!-- Pupils -->
  <ellipse cx="66" cy="103" rx="4" ry="6" fill="#1f2937"/>
  <ellipse cx="94" cy="103" rx="4" ry="6" fill="#1f2937"/>
  <!-- Sparkle -->
  <circle cx="64" cy="98" r="1.5" fill="white"/>
  <circle cx="92" cy="98" r="1.5" fill="white"/>

  <!-- Mouth (cute) -->
  <path d="M 70 125 Q 80 135 90 125" stroke="#15803d" stroke-width="2.5" fill="#dc2626" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Tongue -->
  <ellipse cx="80" cy="130" rx="4" ry="3" fill="#f87171"/>

  <!-- Blush -->
  <ellipse cx="55" cy="118" rx="4" ry="3" fill="#fb923c" opacity="0.4"/>
  <ellipse cx="105" cy="118" rx="4" ry="3" fill="#fb923c" opacity="0.4"/>

  <!-- Slime trail (bottom) -->
  <ellipse cx="80" cy="180" rx="40" ry="6" fill="#86efac" opacity="0.5"/>
</svg>
