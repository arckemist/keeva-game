<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 220" width="160" height="220">
  <defs>
    <radialGradient id="eyeGlow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#14532d"/>
    </radialGradient>
  </defs>

  <!-- Shadow ground -->
  <ellipse cx="80" cy="210" rx="50" ry="6" fill="#000" opacity="0.3"/>

  <!-- Feet (bones) -->
  <ellipse cx="65" cy="205" rx="12" ry="6" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5"/>
  <ellipse cx="95" cy="205" rx="12" ry="6" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5"/>

  <!-- Legs (femur + tibia) -->
  <rect x="58" y="160" width="14" height="40" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5"/>
  <rect x="88" y="160" width="14" height="40" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5"/>
  <circle cx="65" cy="160" r="5" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5"/>
  <circle cx="95" cy="160" r="5" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5"/>

  <!-- Pelvis -->
  <path d="M 55 145 L 105 145 L 100 165 L 60 165 Z" fill="#e5e7eb" stroke="#6b7280" stroke-width="2"/>
  <ellipse cx="80" cy="155" rx="12" ry="6" fill="#9ca3af" opacity="0.4"/>

  <!-- Spine (vertebrae) -->
  <rect x="76" y="115" width="8" height="30" fill="#e5e7eb" stroke="#6b7280" stroke-width="1"/>
  <line x1="74" y1="120" x2="86" y2="120" stroke="#6b7280" stroke-width="0.5"/>
  <line x1="74" y1="128" x2="86" y2="128" stroke="#6b7280" stroke-width="0.5"/>
  <line x1="74" y1="136" x2="86" y2="136" stroke="#6b7280" stroke-width="0.5"/>

  <!-- Ribcage -->
  <g fill="none" stroke="#6b7280" stroke-width="1.5">
    <path d="M 60 120 Q 80 115 100 120"/>
    <path d="M 55 128 Q 80 122 105 128"/>
    <path d="M 55 136 Q 80 130 105 136"/>
    <path d="M 58 144 Q 80 138 102 144"/>
  </g>
  <!-- Rib bones (curved lines) -->
  <g stroke="#e5e7eb" stroke-width="2.5" fill="none">
    <path d="M 62 121 Q 60 128 64 134"/>
    <path d="M 70 119 Q 68 128 72 134"/>
    <path d="M 80 118 L 80 135"/>
    <path d="M 90 119 Q 92 128 88 134"/>
    <path d="M 98 121 Q 100 128 96 134"/>
  </g>

  <!-- Arms (humerus + radius) -->
  <g transform="rotate(-30 50 130)">
    <rect x="44" y="115" width="12" height="35" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5"/>
    <circle cx="50" cy="115" r="5" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5"/>
  </g>
  <g transform="rotate(30 110 130)">
    <rect x="104" y="115" width="12" height="35" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5"/>
    <circle cx="110" cy="115" r="5" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5"/>
  </g>

  <!-- Hands (skeletal fingers) -->
  <g fill="#e5e7eb" stroke="#6b7280" stroke-width="1">
    <ellipse cx="32" cy="155" rx="6" ry="8"/>
    <line x1="29" y1="162" x2="28" y2="172" stroke-width="1.5"/>
    <line x1="32" y1="163" x2="32" y2="174" stroke-width="1.5"/>
    <line x1="35" y1="162" x2="36" y2="172" stroke-width="1.5"/>

    <ellipse cx="128" cy="155" rx="6" ry="8"/>
    <line x1="125" y1="162" x2="124" y2="172" stroke-width="1.5"/>
    <line x1="128" y1="163" x2="128" y2="174" stroke-width="1.5"/>
    <line x1="131" y1="162" x2="132" y2="172" stroke-width="1.5"/>
  </g>

  <!-- Sword (right hand) -->
  <line x1="128" y1="155" x2="135" y2="80" stroke="#9ca3af" stroke-width="5" stroke-linecap="round"/>
  <line x1="128" y1="155" x2="135" y2="80" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="128" y1="100" x2="142" y2="105" stroke="#451a03" stroke-width="4"/>
  <circle cx="135" cy="78" r="3" fill="#fbbf24" stroke="#451a03" stroke-width="1"/>

  <!-- Neck vertebrae -->
  <rect x="76" y="100" width="8" height="15" fill="#e5e7eb" stroke="#6b7280" stroke-width="1"/>
  <line x1="74" y1="105" x2="86" y2="105" stroke="#6b7280" stroke-width="0.5"/>
  <line x1="74" y1="110" x2="86" y2="110" stroke="#6b7280" stroke-width="0.5"/>

  <!-- Skull -->
  <ellipse cx="80" cy="70" rx="32" ry="35" fill="#e5e7eb" stroke="#6b7280" stroke-width="2"/>
  <!-- Top of skull (dome) -->
  <path d="M 55 60 Q 50 30 80 28 Q 110 30 105 60" fill="#e5e7eb" stroke="#6b7280" stroke-width="2"/>
  <!-- Crack -->
  <path d="M 70 30 L 73 40 L 68 50 L 72 60" stroke="#6b7280" stroke-width="1" fill="none"/>

  <!-- Eye sockets (glowing green) -->
  <ellipse cx="68" cy="70" rx="8" ry="10" fill="#000"/>
  <ellipse cx="92" cy="70" rx="8" ry="10" fill="#000"/>
  <circle cx="68" cy="71" r="4" fill="url(#eyeGlow)"/>
  <circle cx="92" cy="71" r="4" fill="url(#eyeGlow)"/>
  <circle cx="68" cy="71" r="1.5" fill="#86efac"/>
  <circle cx="92" cy="71" r="1.5" fill="#86efac"/>

  <!-- Nose hole -->
  <polygon points="80,80 75,90 85,90" fill="#000"/>

  <!-- Teeth (grimace) -->
  <g fill="#fff" stroke="#6b7280" stroke-width="0.8">
    <rect x="64" y="93" width="5" height="6"/>
    <rect x="70" y="93" width="5" height="6"/>
    <rect x="76" y="93" width="5" height="6"/>
    <rect x="82" y="93" width="5" height="6"/>
    <rect x="88" y="93" width="5" height="6"/>
  </g>
  <line x1="64" y1="93" x2="93" y2="93" stroke="#6b7280" stroke-width="1.5"/>
</svg>
